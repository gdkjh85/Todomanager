<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Manager</title>
<style>
  :root {
    --color-work:     #4F8EF7;
    --color-personal: #F97B4F;
    --color-study:    #4FCF8E;
    --bg:             #F4F6FB;
    --surface:        #FFFFFF;
    --border:         #E2E8F0;
    --text-primary:   #1A202C;
    --text-secondary: #718096;
    --radius:         12px;
    --shadow:         0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; padding: 32px 24px 0; display: flex; flex-direction: column; }
  .container { flex: 1; max-width: 100%; display: flex; flex-direction: column; gap: 20px; }
  .footer { text-align: center; padding: 24px 0 16px; font-size: .76rem; color: var(--text-secondary); letter-spacing: .2px; width: 100%; }

  /* 헤더 */
  .header { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 1.4rem; font-weight: 700; }
  .date-nav-wrap { display: flex; align-items: center; gap: 6px; }
  .nav-arrow { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; transition: background .12s; }
  .nav-arrow:hover { background: var(--bg); }
  .date-btn { display: flex; align-items: center; gap: 6px; cursor: pointer; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: .88rem; font-weight: 600; color: var(--text-primary); transition: all .15s; white-space: nowrap; }
  .date-btn:hover { border-color: #4F8EF7; background: #EBF8FF; color: #2B6CB0; }
  .date-btn.is-today { color: #4F8EF7; border-color: #4F8EF7; background: #EBF8FF; }
  .date-btn.is-past  { color: var(--text-secondary); }

  /* 달력 드롭다운 */
  .date-picker-wrap { position: relative; }
  .dp-dropdown { position: absolute; top: calc(100% + 8px); right: 0; z-index: 200; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,.12); padding: 16px; min-width: 280px; }
  .dp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .dp-month-label { font-size: .9rem; font-weight: 600; }
  .dp-nav { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: .85rem; display: flex; align-items: center; justify-content: center; }
  .dp-nav:hover { background: var(--bg); }
  .dp-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .dp-day-label { text-align: center; font-size: .72rem; color: var(--text-secondary); padding: 4px 0; }
  .dp-day { text-align: center; font-size: .82rem; padding: 6px 2px; border-radius: 6px; cursor: pointer; color: var(--text-primary); transition: background .1s; }
  .dp-day:hover { background: var(--bg); }
  .dp-day.other-month { color: #CBD5E0; }
  .dp-day.is-today { font-weight: 700; color: #4F8EF7; }
  .dp-day.selected { background: #4F8EF7; color: #fff !important; font-weight: 600; }
  .dp-day.has-dot { position: relative; }
  .dp-day.has-dot::after { content:''; position:absolute; bottom:2px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:#4FCF8E; }
  .dp-day.selected::after { background: rgba(255,255,255,.7); }
  .dp-today-btn { margin-top: 10px; width: 100%; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: .83rem; font-weight: 500; cursor: pointer; }
  .dp-today-btn:hover { background: #EBF8FF; border-color: #4F8EF7; color: #2B6CB0; }

  /* 배너 */
  .past-banner { background: #FFFBEB; border: 1px solid #F6E05E; border-radius: var(--radius); padding: 12px 20px; display: none; align-items: center; justify-content: space-between; gap: 12px; }
  .past-banner.show { display: flex; }
  .past-banner p { font-size: .85rem; color: #744210; }
  .go-today-btn { font-size: .78rem; background: #F6E05E; border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-weight: 600; color: #744210; white-space: nowrap; }

  /* 진행률 */
  .progress-section { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
  .prog-top { display: flex; justify-content: space-between; align-items: center; }
  .prog-title { font-size: .9rem; font-weight: 600; }
  .prog-fraction { font-size: 1.6rem; font-weight: 700; letter-spacing: -1px; }
  .prog-fraction span { font-size: .9rem; font-weight: 400; color: var(--text-secondary); margin-left: 2px; }
  .prog-pct-big { font-size: 2rem; font-weight: 700; }
  .prog-remain { font-size: .82rem; color: var(--text-secondary); text-align: right; margin-top: 2px; }
  .progress-bar-wrap { background: var(--border); border-radius: 99px; height: 12px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#4F8EF7,#4FCF8E); width: 0%; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .cat-stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .cat-card { flex: 1; min-width: 120px; background: var(--bg); border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
  .cat-card-top { display: flex; align-items: center; justify-content: space-between; }
  .cat-card-label { font-size: .78rem; font-weight: 600; color: var(--text-secondary); }
  .cat-card-count { font-size: .78rem; font-weight: 700; }
  .cat-mini-bar-wrap { background: var(--border); border-radius: 99px; height: 5px; overflow: hidden; }
  .cat-mini-bar { height: 100%; border-radius: 99px; width: 0%; transition: width .5s ease; }
  .cat-mini-bar.work { background: var(--color-work); }
  .cat-mini-bar.personal { background: var(--color-personal); }
  .cat-mini-bar.study { background: var(--color-study); }

  /* 완료 배너 */
  .congrats { background: linear-gradient(135deg,#4F8EF7,#4FCF8E); border-radius: var(--radius); padding: 18px 24px; color: #fff; text-align: center; display: none; }
  .congrats.show { display: block; }
  .congrats p { font-size: 1rem; font-weight: 600; }
  .congrats small { font-size: .82rem; opacity: .85; }

  /* 입력 폼 */
  .input-form { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 28px; display: flex; flex-direction: column; gap: 10px; }
  .input-form.disabled { opacity: .45; pointer-events: none; }
  .input-row { display: flex; gap: 10px; align-items: center; }
  .input-text { flex: 1; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: .92rem; font-family: inherit; color: var(--text-primary); outline: none; transition: border-color .15s; }
  .input-text::placeholder { color: #A0AEC0; }
  .input-text:focus { border-color: #4F8EF7; }
  .input-text.error { border-color: #FC8181; animation: shake .3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .input-select { border: 1.5px solid var(--border); border-radius: 8px; padding: 10px; font-size: .88rem; font-family: inherit; background: var(--surface); outline: none; cursor: pointer; }
  .add-btn { background: var(--text-primary); color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: .9rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .add-btn:hover { background: #2D3748; }
  .dt-toggle-row { display: flex; align-items: center; gap: 8px; }
  .dt-label { font-size: .78rem; color: var(--text-secondary); white-space: nowrap; }
  .dt-toggle-btn { font-size: .78rem; padding: 4px 12px; border-radius: 99px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text-secondary); transition: all .15s; }
  .dt-toggle-btn.on-scheduled { background: #EBF8FF; border-color: #4F8EF7; color: #2B6CB0; }
  .dt-toggle-btn.on-deadline  { background: #FFF5F5; border-color: #FC8181; color: #C53030; }
  .dt-fields { display: flex; flex-direction: column; gap: 8px; }
  .dt-row { display: flex; gap: 10px; align-items: center; }
  .input-datetime { flex: 1; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: .84rem; font-family: inherit; color: var(--text-secondary); background: var(--surface); outline: none; cursor: pointer; }
  .input-datetime.deadline-input { border-color: #FEB2B2; }

  /* 목록 */
  .list-section { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .list-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border); }
  .filter-tabs { display: flex; }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 14px 12px; font-size: .85rem; font-weight: 500; color: var(--text-secondary); cursor: pointer; margin-bottom: -1px; transition: all .15s; }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.active { color: #4F8EF7; border-bottom-color: #4F8EF7; font-weight: 600; }
  .list-meta { font-size: .78rem; color: var(--text-secondary); white-space: nowrap; }
  .list-col-header { display: flex; align-items: center; gap: 10px; padding: 8px 24px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .col-h { font-size: .72rem; font-weight: 600; color: var(--text-secondary); letter-spacing: .3px; white-space: nowrap; }
  .col-h.check { width: 20px; flex-shrink: 0; text-align: center; }
  .col-h.text  { flex: 1; }
  .col-h.sched { width: 86px; text-align: center; }
  .col-h.dead  { width: 86px; text-align: center; }
  .col-h.cat   { width: 42px; text-align: center; }
  .col-h.acts  { width: 96px; }
  .todo-list { padding: 0; min-height: 60px; }

  /* 아이템 */
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 13px 24px; border-bottom: 1px solid var(--border); transition: background .1s; }
  .todo-item:last-child { border-bottom: none; }
  .todo-item:hover { background: #FAFBFF; }
  .todo-item.carried { background: #FFFBF0; }
  .todo-item.carried:hover { background: #FFF8E7; }
  .checkbox-wrap { position: relative; flex-shrink: 0; width: 20px; height: 20px; }
  .checkbox-wrap input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; margin: 0; }
  .checkbox-custom { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: center; transition: all .15s; pointer-events: none; }
  .checkbox-wrap input:checked + .checkbox-custom { background: #4F8EF7; border-color: #4F8EF7; }
  .checkbox-wrap input:checked + .checkbox-custom::after { content:'✓'; color:#fff; font-size:.75rem; font-weight:700; }
  .checkbox-wrap input:hover + .checkbox-custom { border-color: #4F8EF7; }
  .todo-text { flex: 1; font-size: .92rem; line-height: 1.4; }
  .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-secondary); }
  .todo-item.completed { opacity: .6; }

  /* 배지 */
  .badge { font-size: .72rem; font-weight: 600; padding: 3px 9px; border-radius: 99px; flex-shrink: 0; color: #fff; width: 42px; text-align: center; }
  .badge.work { background: var(--color-work); }
  .badge.personal { background: var(--color-personal); }
  .badge.study { background: var(--color-study); }
  .time-cell { width: 86px; flex-shrink: 0; }
  .scheduled-badge, .deadline-badge { font-size: .7rem; padding: 2px 6px; border-radius: 6px; white-space: nowrap; display: inline-flex; align-items: center; gap: 2px; }
  .scheduled-badge { color: var(--text-secondary); background: #F7FAFF; border: 1px solid var(--border); }
  .scheduled-badge.s-today { color: #fff; background: #4F8EF7; border-color: #4F8EF7; }
  .scheduled-badge.s-soon  { color: #744210; background: #FEFCBF; border-color: #F6E05E; }
  .deadline-badge.d-safe    { color: #fff;    background: #4F8EF7; border: 1px solid #4F8EF7; }
  .deadline-badge.d-soon    { color: #744210; background: #FEFCBF; border: 1px solid #F6E05E; }
  .deadline-badge.d-overdue { color: #fff;    background: #E53E3E; border: 1px solid #E53E3E; }
  .deadline-badge.d-done    { color: #fff;    background: var(--text-secondary); border: 1px solid var(--text-secondary); opacity:.5; }
  .snooze-badge { font-size: .7rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; white-space: nowrap; background: #FEFCBF; border: 1px solid #F6E05E; color: #744210; }
  .snooze-badge.danger { background: #FFF5F5; border-color: #FC8181; color: #C53030; }
  .carried-badge { font-size: .68rem; font-weight: 600; padding: 2px 7px; border-radius: 99px; background: #FEFCBF; border: 1px solid #F6E05E; color: #744210; white-space: nowrap; }

  /* 액션 버튼 */
  .item-actions { display: flex; gap: 5px; width: 96px; flex-shrink: 0; }
  .action-btn { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: .8rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .action-btn.snooze:hover { background: #FFFBEB; border-color: #F6E05E; }
  .action-btn.edit:hover   { background: #EBF4FF; border-color: #BEE3F8; }
  .action-btn.delete:hover { background: #FFF0F0; border-color: #FEB2B2; }

  /* 삭제 확인 */
  .delete-confirm { display: flex; align-items: center; gap: 6px; padding: 5px 10px; background: #FFF5F5; border: 1px solid #FEB2B2; border-radius: 8px; font-size: .78rem; }
  .delete-confirm span { color: #C53030; font-weight: 500; }
  .confirm-yes { background: #E53E3E; color: #fff; border: none; border-radius: 4px; padding: 3px 9px; font-size: .76rem; cursor: pointer; }
  .confirm-no  { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 3px 9px; font-size: .76rem; cursor: pointer; }

  /* 편집 모드 */
  .todo-item.editing { flex-wrap: wrap; gap: 8px; background: #F0F7FF; border-left: 3px solid #4F8EF7; padding-left: 21px; }
  .edit-input { flex: 1; min-width: 160px; border: 1.5px solid #4F8EF7; border-radius: 8px; padding: 7px 12px; font-size: .9rem; font-family: inherit; outline: none; }
  .edit-select { border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 8px; font-size: .85rem; font-family: inherit; background: var(--surface); outline: none; cursor: pointer; }
  .edit-dt { border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 8px; font-size: .78rem; font-family: inherit; background: var(--surface); outline: none; cursor: pointer; }
  .edit-dt.dl { border-color: #FEB2B2; }
  .save-btn { background: #4F8EF7; color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: .85rem; font-weight: 600; cursor: pointer; }
  .save-btn:hover { background: #3A7DE0; }
  .cancel-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: .85rem; cursor: pointer; }

  /* 빈 상태 */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
  .empty-state .icon { font-size: 2.6rem; margin-bottom: 10px; }
  .empty-state p { font-size: .9rem; }
  .empty-state small { font-size: .78rem; margin-top: 4px; display: block; opacity: .7; }

  /* 팝업 */
  .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .popup-box { background: #fff; border-radius: var(--radius); padding: 36px 32px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,.2); animation: popIn .25s ease; }
  @keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
  .popup-icon  { font-size: 3rem; margin-bottom: 14px; }
  .popup-msg   { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); line-height: 1.5; }
  .popup-sub   { font-size: .82rem; color: var(--text-secondary); margin-top: 8px; }
  .popup-close { margin-top: 24px; background: var(--text-primary); color: #fff; border: none; border-radius: 8px; padding: 10px 32px; font-size: .9rem; font-weight: 600; cursor: pointer; }
  .popup-close:hover { background: #2D3748; }

  /* 토스트 */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A202C; color: #fff; padding: 10px 20px; border-radius: 99px; font-size: .85rem; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,.2); transition: transform .3s ease; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    body { padding: 16px 10px 0; }
    .header, .progress-section, .input-form { padding: 18px; }
    .todo-item { padding: 12px 16px; }
    .cat-card { min-width: 90px; }
    .dp-dropdown { right: 0; left: auto; }
  }
</style>
</head>
<body>

<div class="container">

  <header class="header">
    <h1>📋 Todo Manager</h1>
    <div class="date-picker-wrap">
      <div class="date-nav-wrap">
        <button class="nav-arrow" id="prev-day">&#8249;</button>
        <button class="date-btn" id="date-btn"></button>
        <button class="nav-arrow" id="next-day">&#8250;</button>
      </div>
      <div class="dp-dropdown" id="dp-dropdown" style="display:none">
        <div class="dp-header">
          <button class="dp-nav" id="dp-prev">&#8249;</button>
          <span class="dp-month-label" id="dp-month-label"></span>
          <button class="dp-nav" id="dp-next">&#8250;</button>
        </div>
        <div class="dp-grid" id="dp-grid"></div>
        <button class="dp-today-btn" id="dp-today-btn">오늘로 이동</button>
      </div>
    </div>
  </header>

  <div class="past-banner" id="past-banner">
    <p id="past-banner-text"></p>
    <button class="go-today-btn" id="go-today-btn">오늘로 돌아가기</button>
  </div>

  <div class="congrats" id="congrats">
    <p>🎉 모든 할 일을 완료했어요!</p>
    <small>오늘도 수고했습니다 ✨</small>
  </div>

  <section class="progress-section">
    <div class="prog-top">
      <div>
        <div class="prog-title">진행률</div>
        <div class="prog-fraction" id="prog-fraction">0<span>/ 0 완료</span></div>
      </div>
      <div style="text-align:right">
        <div class="prog-pct-big" id="prog-pct">0%</div>
        <div class="prog-remain" id="prog-remain"></div>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="cat-stats" id="cat-stats"></div>
  </section>

  <div class="input-form" id="input-form">
    <div class="input-row">
      <input class="input-text" id="input-text" type="text" placeholder="새 할 일을 입력하세요..." />
      <select class="input-select" id="input-cat">
        <option value="work">💼 업무</option>
        <option value="personal">🏠 개인</option>
        <option value="study">📚 공부</option>
      </select>
      <button class="add-btn" id="add-btn">+ 추가</button>
    </div>
    <div class="dt-toggle-row">
      <span class="dt-label">날짜/시간</span>
      <button class="dt-toggle-btn" id="btn-scheduled">🗓 예정 시간</button>
      <button class="dt-toggle-btn" id="btn-deadline">⏰ 마감 시간</button>
    </div>
    <div class="dt-fields" id="dt-fields"></div>
  </div>

  <div class="list-section">
    <div class="list-header">
      <div class="filter-tabs" id="filter-tabs">
        <button class="tab-btn active" data-filter="all">전체</button>
        <button class="tab-btn" data-filter="work">💼 업무</button>
        <button class="tab-btn" data-filter="personal">🏠 개인</button>
        <button class="tab-btn" data-filter="study">📚 공부</button>
      </div>
      <span class="list-meta" id="list-meta"></span>
    </div>
    <div class="list-col-header">
      <span class="col-h check">✓</span>
      <span class="col-h text">To-do</span>
      <span class="col-h sched">예정 시간</span>
      <span class="col-h dead">마감 시간</span>
      <span class="col-h cat">분류</span>
      <span class="col-h acts"></span>
    </div>
    <div class="todo-list" id="todo-list"></div>
  </div>

</div>

<footer class="footer">© 2026 JH. All rights reserved.</footer>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'todos';
var CAT_LABEL = { work:'업무', personal:'개인', study:'공부' };
var CAT_EMOJI = { work:'💼', personal:'🏠', study:'📚' };
var DAY_NAMES = ['일','월','화','수','목','금','토'];

var todos = [];
var currentFilter = 'all';
var showScheduled = false;
var showDeadline  = false;
var dpYear, dpMonth;
var viewDate = toDateStr(new Date());

function toDateStr(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n) { return n<10?'0'+n:''+n; }
function todayStr() { return toDateStr(new Date()); }
function parseDate(s) { var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function addDays(s,n) { var d=parseDate(s); d.setDate(d.getDate()+n); return toDateStr(d); }
function fmtLabel(s) { var d=parseDate(s); return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+DAY_NAMES[d.getDay()]+')'; }

function saveTodos() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); } catch(e){} }
function loadTodos() { try { todos=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; } catch(e){ todos=[]; } }
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function find(id) { for(var i=0;i<todos.length;i++) if(todos[i].id===id) return todos[i]; return null; }

function getForDate(ds) {
  var out=[];
  for (var i=0;i<todos.length;i++) {
    var t=todos[i];
    if (t.completed) {
      if ((t.completedDate||t.date)===ds) out.push(t);
    } else {
      if (ds>todayStr()) { if(t.date===ds) out.push(t); }
      else               { if(t.date<=ds)  out.push(t); }
    }
  }
  return out;
}

function addTodo(text,cat,scheduledAt,deadlineAt) {
  if (!text.trim()) {
    var el=document.getElementById('input-text');
    el.classList.add('error'); el.focus();
    setTimeout(function(){ el.classList.remove('error'); },400);
    return false;
  }
  todos.push({ id:genId(), text:text.trim(), category:cat, date:viewDate,
    completed:false, completedDate:null,
    scheduledAt:scheduledAt||null, deadlineAt:deadlineAt||null,
    snoozed:0, createdAt:new Date().toISOString() });
  saveTodos(); renderAll();
  showToast('"'+text.trim()+'" 추가됨');
  return true;
}

function toggleTodo(id) {
  var t=find(id); if(!t) return;
  t.completed=!t.completed;
  t.completedDate=t.completed?viewDate:null;
  saveTodos(); renderAll();
  showToast(t.completed?'✅ 완료!':'↩️ 진행 중으로 변경');
}

function deleteTodo(id) {
  var t=find(id); if(!t) return;
  var name=t.text;
  todos=todos.filter(function(x){ return x.id!==id; });
  saveTodos(); renderAll();
  showToast('"'+name+'" 삭제됨');
}

function snoozeTodo(id) {
  if (viewDate>todayStr()) { showPopup('😤','임박하지도 않았는데\n내일로 미루는 당신!','미워! 🫵','반성할게요 😔'); return; }
  var t=find(id); if(!t) return;
  t.snoozed=(t.snoozed||0)+1;
  if (t.snoozed>=3) showPopup('🛋️','게으른 자여,\n그만 미루세요!','이미 3번 이상 미뤘어요. 지금 당장 해치워버려요! 💪','반성할게요 😔');
  var D=864e5;
  if (t.scheduledAt) t.scheduledAt=new Date(new Date(t.scheduledAt).getTime()+D).toISOString();
  if (t.deadlineAt)  t.deadlineAt =new Date(new Date(t.deadlineAt).getTime()+D).toISOString();
  t.date=addDays(t.date,1);
  saveTodos(); renderAll();
  showToast('📅 내일로 미뤘어요 ('+t.snoozed+'번째)');
}

function showPopup(icon,msg,sub,btnText) {
  var ov=document.createElement('div'); ov.className='popup-overlay';
  ov.innerHTML='<div class="popup-box"><div class="popup-icon">'+icon+'</div>'+
    '<div class="popup-msg">'+msg.replace(/\n/g,'<br>')+'</div>'+
    '<div class="popup-sub">'+sub+'</div>'+
    '<button class="popup-close">'+btnText+'</button></div>';
  document.body.appendChild(ov);
  ov.querySelector('.popup-close').onclick=function(){ document.body.removeChild(ov); };
  ov.onclick=function(e){ if(e.target===ov) document.body.removeChild(ov); };
}

function fmtDT(iso) {
  if (!iso) return null;
  var d=new Date(iso);
  return pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function fmtScheduled(iso) {
  if (!iso) return null;
  var diff=new Date(iso)-new Date();
  var cls=diff<0?'s-today':diff<864e5?'s-today':diff<1728e5?'s-soon':'';
  return { label:fmtDT(iso), cls:cls };
}
function fmtDeadline(iso,done) {
  if (!iso) return null;
  if (done) return { label:fmtDT(iso), cls:'d-done' };
  var diff=new Date(iso)-new Date();
  return { label:fmtDT(iso), cls:diff<0?'d-overdue':diff<14400000?'d-soon':'d-safe' };
}

function renderAll() {
  renderHeader(); renderBanner(); renderList(); renderProgress(); renderCalendar();
  document.getElementById('input-form').className='input-form'+(viewDate<todayStr()?' disabled':'');
}

function renderHeader() {
  var btn=document.getElementById('date-btn');
  btn.textContent=fmtLabel(viewDate);
  var t=todayStr();
  btn.className='date-btn'+(viewDate===t?' is-today':viewDate<t?' is-past':'');
}

function renderBanner() {
  var b=document.getElementById('past-banner');
  if (viewDate<todayStr()) {
    b.className='past-banner show';
    document.getElementById('past-banner-text').textContent='과거 기록을 보고 있어요. 새 할 일은 오늘 또는 미래 날짜에만 추가할 수 있어요.';
  } else { b.className='past-banner'; }
}

function renderList() {
  var list=document.getElementById('todo-list');
  var day=getForDate(viewDate);
  var filt=currentFilter==='all'?day:day.filter(function(t){ return t.category===currentFilter; });
  var sorted=filt.filter(function(t){ return !t.completed; }).concat(filt.filter(function(t){ return t.completed; }));
  var rem=filt.filter(function(t){ return !t.completed; }).length;
  document.getElementById('list-meta').textContent=filt.length?rem+'개 남음':'';

  if (!sorted.length) {
    list.innerHTML='<div class="empty-state"><div class="icon">'+(viewDate===todayStr()?'📝':'📅')+'</div>'+
      '<p>'+(viewDate===todayStr()?'할 일을 추가해보세요':fmtLabel(viewDate)+'의 기록이 없어요')+'</p>'+
      '<small>'+(viewDate===todayStr()?'위 입력창에서 새 할 일을 등록하세요':'')+'</small></div>';
    return;
  }

  var html='';
  for (var i=0;i<sorted.length;i++) {
    var t=sorted[i];
    var sb=fmtScheduled(t.scheduledAt);
    var db=fmtDeadline(t.deadlineAt,t.completed);
    var sn=t.snoozed||0;
    var car=!t.completed&&t.date<viewDate;
    html+='<div class="todo-item'+(t.completed?' completed':'')+(car?' carried':'')+'" data-id="'+t.id+'">'+
      '<label class="checkbox-wrap">'+
        '<input type="checkbox" class="chk" data-id="'+t.id+'"'+(t.completed?' checked':'')+'>'+
        '<div class="checkbox-custom"></div>'+
      '</label>'+
      '<span class="todo-text">'+esc(t.text)+
        (car?' <span class="carried-badge">↪이월</span>':'')+
        (sn>0?' <span class="snooze-badge'+(sn>=3?' danger':'')+'">💤'+sn+'회</span>':'')+
      '</span>'+
      '<div class="time-cell">'+(sb?'<span class="scheduled-badge '+sb.cls+'">'+sb.label+'</span>':'')+'</div>'+
      '<div class="time-cell">'+(db?'<span class="deadline-badge '+db.cls+'">'+db.label+'</span>':'')+'</div>'+
      '<span class="badge '+t.category+'">'+CAT_LABEL[t.category]+'</span>'+
      '<div class="item-actions">'+
        '<button class="action-btn snooze" data-action="snooze" data-id="'+t.id+'" title="미루기">📅</button>'+
        '<button class="action-btn edit"   data-action="edit"   data-id="'+t.id+'" title="수정">✏️</button>'+
        '<button class="action-btn delete" data-action="delete" data-id="'+t.id+'" title="삭제">🗑️</button>'+
      '</div>'+
    '</div>';
  }
  list.innerHTML=html;
}

function renderProgress() {
  var day=getForDate(viewDate);
  var total=day.length, done=day.filter(function(t){ return t.completed; }).length;
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fraction').innerHTML=done+'<span>/ '+total+' 완료</span>';
  var rem=total-done;
  document.getElementById('prog-remain').textContent=rem>0?rem+'개 남았어요':total>0?'모두 완료!':'';
  var cats=['work','personal','study'], ch='';
  for (var i=0;i<cats.length;i++) {
    var c=cats[i];
    var all=day.filter(function(t){ return t.category===c; });
    var comp=all.filter(function(t){ return t.completed; });
    var p=all.length?Math.round(comp.length/all.length*100):0;
    ch+='<div class="cat-card"><div class="cat-card-top">'+
      '<span class="cat-card-label">'+CAT_EMOJI[c]+' '+CAT_LABEL[c]+'</span>'+
      '<span class="cat-card-count">'+comp.length+'/'+all.length+'</span>'+
      '</div><div class="cat-mini-bar-wrap"><div class="cat-mini-bar '+c+'" style="width:'+p+'%"></div></div></div>';
  }
  document.getElementById('cat-stats').innerHTML=ch;
  document.getElementById('congrats').className='congrats'+(total>0&&done===total?' show':'');
}

function renderCalendar() {
  var today=new Date();
  if (dpYear===undefined){ dpYear=today.getFullYear(); dpMonth=today.getMonth(); }
  document.getElementById('dp-month-label').textContent=dpYear+'년 '+(dpMonth+1)+'월';
  var hasDot={};
  for (var i=0;i<todos.length;i++){
    var t=todos[i];
    hasDot[t.completed?(t.completedDate||t.date):t.date]=true;
  }
  var first=new Date(dpYear,dpMonth,1).getDay();
  var days=new Date(dpYear,dpMonth+1,0).getDate();
  var ts=todayStr(), html='';
  for (var d=0;d<7;d++) html+='<div class="dp-day-label">'+DAY_NAMES[d]+'</div>';
  for (var b=0;b<first;b++) html+='<div></div>';
  for (var day=1;day<=days;day++) {
    var ds=dpYear+'-'+pad(dpMonth+1)+'-'+pad(day);
    var cls='dp-day';
    if (ds===ts)       cls+=' is-today';
    if (ds===viewDate) cls+=' selected';
    if (hasDot[ds])    cls+=' has-dot';
    html+='<div class="'+cls+'" data-date="'+ds+'">'+day+'</div>';
  }
  document.getElementById('dp-grid').innerHTML=html;
}

function startEdit(id) {
  var itemEl=document.querySelector('.todo-item[data-id="'+id+'"]');
  var t=find(id); if(!itemEl||!t) return;
  itemEl.className='todo-item editing';
  itemEl.innerHTML=
    '<input class="edit-input" id="ei-text" value="'+esc(t.text)+'">'+
    '<select class="edit-select" id="ei-cat">'+
      '<option value="work"'    +(t.category==='work'    ?' selected':'')+'>💼 업무</option>'+
      '<option value="personal"'+(t.category==='personal'?' selected':'')+'>🏠 개인</option>'+
      '<option value="study"'   +(t.category==='study'   ?' selected':'')+'>📚 공부</option>'+
    '</select>'+
    '<input class="edit-dt" id="ei-sc" type="datetime-local" title="예정 시간"'+(t.scheduledAt?' value="'+t.scheduledAt.slice(0,16)+'"':'')+'>'+
    '<input class="edit-dt dl" id="ei-dl" type="datetime-local" title="마감 시간"'+(t.deadlineAt?' value="'+t.deadlineAt.slice(0,16)+'"':'')+'>'+
    '<button class="save-btn" id="ei-save">저장</button>'+
    '<button class="cancel-btn" id="ei-cancel">취소</button>';
  var inp=document.getElementById('ei-text');
  inp.focus(); inp.selectionStart=inp.selectionEnd=inp.value.length;
  document.getElementById('ei-save').onclick=function(){
    var v=document.getElementById('ei-text').value.trim(); if(!v){inp.focus();return;}
    t.text=v; t.category=document.getElementById('ei-cat').value;
    var sv=document.getElementById('ei-sc').value, dv=document.getElementById('ei-dl').value;
    t.scheduledAt=sv?new Date(sv).toISOString():null;
    t.deadlineAt =dv?new Date(dv).toISOString():null;
    saveTodos(); renderAll(); showToast('✏️ 수정됐어요!');
  };
  document.getElementById('ei-cancel').onclick=function(){ renderAll(); };
  inp.onkeydown=function(e){
    if(e.key==='Enter') document.getElementById('ei-save').click();
    if(e.key==='Escape') renderAll();
  };
}

function renderDtFields() {
  var w=document.getElementById('dt-fields');
  var prevSc=(document.getElementById('input-scheduled')||{}).value||'';
  var prevDl=(document.getElementById('input-deadline') ||{}).value||'';
  var h='';
  if (showScheduled) h+='<div class="dt-row"><span class="dt-label">🗓 예정 시간</span><input class="input-datetime" id="input-scheduled" type="datetime-local"></div>';
  if (showDeadline)  h+='<div class="dt-row"><span class="dt-label">⏰ 마감 시간</span><input class="input-datetime deadline-input" id="input-deadline" type="datetime-local"></div>';
  w.innerHTML=h;
  var sc=document.getElementById('input-scheduled'), dl=document.getElementById('input-deadline');
  if(sc&&prevSc) sc.value=prevSc;
  if(dl&&prevDl) dl.value=prevDl;
}

function getInputDates() {
  var se=document.getElementById('input-scheduled'), de=document.getElementById('input-deadline');
  return { scheduledAt:(se&&se.value)?new Date(se.value).toISOString():null,
           deadlineAt: (de&&de.value)?new Date(de.value).toISOString():null };
}

function clearDtFields() {
  showScheduled=false; showDeadline=false;
  document.getElementById('btn-scheduled').classList.remove('on-scheduled');
  document.getElementById('btn-deadline').classList.remove('on-deadline');
  renderDtFields();
}

var toastTimer;
function showToast(msg) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.classList.remove('show'); },2000);
}

/* 이벤트 */
document.getElementById('date-btn').onclick=function(e){
  e.stopPropagation();
  var dp=document.getElementById('dp-dropdown');
  dp.style.display=dp.style.display==='none'?'block':'none';
  if(dp.style.display==='block') renderCalendar();
};
document.addEventListener('click',function(){ document.getElementById('dp-dropdown').style.display='none'; });
document.getElementById('dp-dropdown').onclick=function(e){ e.stopPropagation(); };
document.getElementById('dp-grid').onclick=function(e){
  var cell=e.target.closest('[data-date]'); if(!cell) return;
  viewDate=cell.getAttribute('data-date');
  document.getElementById('dp-dropdown').style.display='none';
  renderAll();
};
document.getElementById('dp-prev').onclick=function(){ dpMonth--; if(dpMonth<0){dpMonth=11;dpYear--;} renderCalendar(); };
document.getElementById('dp-next').onclick=function(){ dpMonth++; if(dpMonth>11){dpMonth=0;dpYear++;} renderCalendar(); };
document.getElementById('dp-today-btn').onclick=function(){ viewDate=todayStr(); document.getElementById('dp-dropdown').style.display='none'; renderAll(); };
document.getElementById('prev-day').onclick=function(){ viewDate=addDays(viewDate,-1); renderAll(); };
document.getElementById('next-day').onclick=function(){ viewDate=addDays(viewDate,1); renderAll(); };
document.getElementById('go-today-btn').onclick=function(){ viewDate=todayStr(); renderAll(); };

document.getElementById('todo-list').addEventListener('change',function(e){
  if(e.target.classList.contains('chk')) toggleTodo(e.target.getAttribute('data-id'));
});
document.getElementById('todo-list').addEventListener('click',function(e){
  var btn=e.target.closest('[data-action]'); if(!btn) return;
  var id=btn.getAttribute('data-id'), action=btn.getAttribute('data-action');
  if(action==='snooze'){ snoozeTodo(id); return; }
  if(action==='edit')  { startEdit(id);  return; }
  if(action==='delete'){
    var itemEl=btn.closest('.todo-item');
    var ex=itemEl.querySelector('.delete-confirm');
    if(ex){ ex.remove(); return; }
    var wrap=document.createElement('div'); wrap.className='delete-confirm';
    wrap.innerHTML='<span>삭제할까요?</span><button class="confirm-yes">삭제</button><button class="confirm-no">취소</button>';
    wrap.querySelector('.confirm-yes').onclick=function(){ deleteTodo(id); };
    wrap.querySelector('.confirm-no').onclick =function(){ wrap.remove(); };
    itemEl.appendChild(wrap);
  }
});

document.getElementById('add-btn').onclick=function(){
  var inp=document.getElementById('input-text'), cat=document.getElementById('input-cat').value;
  var dates=getInputDates();
  if(addTodo(inp.value,cat,dates.scheduledAt,dates.deadlineAt)){ inp.value=''; clearDtFields(); inp.focus(); }
};
document.getElementById('input-text').onkeydown=function(e){ if(e.key==='Enter') document.getElementById('add-btn').click(); };
document.getElementById('btn-scheduled').onclick=function(){ showScheduled=!showScheduled; this.classList.toggle('on-scheduled',showScheduled); renderDtFields(); };
document.getElementById('btn-deadline').onclick =function(){ showDeadline=!showDeadline; this.classList.toggle('on-deadline',showDeadline); renderDtFields(); };
document.getElementById('filter-tabs').addEventListener('click',function(e){
  var btn=e.target.closest('.tab-btn'); if(!btn) return;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active'); currentFilter=btn.getAttribute('data-filter'); renderList();
});

loadTodos();
renderAll();
</script>
</body>
</html>
